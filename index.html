<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гадость</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a14;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        .solar-scene {
            position: fixed;
            inset: 0;
        }

        #solarCanvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        .solar-map {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            padding: clamp(10px, 3vh, 28px) 16px;
            pointer-events: none;
        }

        .solar-planet {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(4px, 1vh, 10px);
            flex: 1 1 0;
            min-height: 0;
            width: 100%;
            max-width: 120px;
            text-decoration: none;
            pointer-events: auto;
            cursor: pointer;
        }

        .solar-planet__label {
            color: #fff;
            font-size: clamp(14px, 2.7vw, 20px);
            font-weight: 600;
            white-space: nowrap;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.55);
            line-height: 1.1;
        }

        .solar-planet--venus .solar-planet__label {
            color: #f5e6c8;
        }

        .solar-planet--sun .solar-planet__label {
            font-size: clamp(16px, 3.4vw, 24px);
        }

        .solar-planet__sphere {
            display: block;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .solar-planet--jupiter .solar-planet__sphere {
            width: clamp(28px, 9vw, 44px);
            height: clamp(28px, 9vw, 44px);
            background: #c0a89c;
            box-shadow: 0 0 clamp(12px, 4vw, 24px) rgba(255, 225, 180, 0.35);
        }

        .solar-planet--moon .solar-planet__sphere {
            width: clamp(22px, 7vw, 36px);
            height: clamp(22px, 7vw, 36px);
            background: #c0c5c9;
            box-shadow: 0 0 clamp(10px, 3.5vw, 20px) rgba(255, 255, 255, 0.3);
        }

        .solar-planet--venus .solar-planet__sphere {
            width: clamp(24px, 7.5vw, 38px);
            height: clamp(24px, 7.5vw, 38px);
            background: #e8cda8;
            box-shadow: 0 0 clamp(11px, 3.8vw, 22px) rgba(255, 220, 160, 0.35);
        }

        .solar-planet--sun .solar-planet__sphere {
            width: clamp(44px, 17vw, 72px);
            height: clamp(44px, 17vw, 72px);
            background: #f5d371;
            box-shadow: 0 0 clamp(18px, 6vw, 36px) rgba(245, 211, 113, 0.55);
        }
    </style>
</head>
<body>
    <div class="solar-scene">
        <canvas id="solarCanvas" aria-hidden="true"></canvas>

        <nav class="solar-map" aria-label="Карта системы">
            <a
                class="solar-planet solar-planet--jupiter"
                href="https://cu584805.tw1.ru/"
                target="_blank"
                rel="noopener noreferrer"
            >
                <span class="solar-planet__label">JUPITER</span>
                <span class="solar-planet__sphere" aria-hidden="true"></span>
            </a>

            <a
                class="solar-planet solar-planet--moon"
                href="https://xiersent.github.io/moon/"
                target="_blank"
                rel="noopener noreferrer"
            >
                <span class="solar-planet__label">MOON</span>
                <span class="solar-planet__sphere" aria-hidden="true"></span>
            </a>

            <a
                class="solar-planet solar-planet--venus"
                href="https://xiersent.github.io/venus/"
                target="_blank"
                rel="noopener noreferrer"
            >
                <span class="solar-planet__label">VENUS</span>
                <span class="solar-planet__sphere" aria-hidden="true"></span>
            </a>

            <a
                class="solar-planet solar-planet--sun"
                href="https://xiersent.github.io/sun/"
                target="_blank"
                rel="noopener noreferrer"
            >
                <span class="solar-planet__label">SUN</span>
                <span class="solar-planet__sphere" aria-hidden="true"></span>
            </a>
        </nav>
    </div>

<script>
    const canvas = document.getElementById('solarCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    let centerX = 0;
    let centerY = 0;

    function generateStars(count = 220) {
        stars = [];
        for (let i = 0; i < count; i++) {
            stars.push({
                x: Math.random(),
                y: Math.random(),
                size: Math.random() * 2 + 0.5,
                brightness: Math.random() * 0.45 + 0.2,
            });
        }
    }

    function drawBackground() {
        ctx.fillStyle = '#0a0a18';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const gradient = ctx.createRadialGradient(
            centerX,
            centerY,
            0,
            centerX,
            centerY,
            Math.max(canvas.width, canvas.height),
        );
        gradient.addColorStop(0, 'rgba(35, 45, 75, 0.35)');
        gradient.addColorStop(1, 'rgba(10, 10, 20, 0.9)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (const star of stars) {
            ctx.fillStyle = `rgba(255, 250, 240, ${star.brightness})`;
            ctx.beginPath();
            ctx.arc(star.x * canvas.width, star.y * canvas.height, star.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        centerX = canvas.width / 2;
        centerY = canvas.height / 2;
        drawBackground();
    }

    generateStars();
    resizeCanvas();

    window.addEventListener('resize', resizeCanvas);
</script>
</body>
</html>
