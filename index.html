<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гадость</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a14;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #1a2645 0%, #070711 100%);
            object-fit: cover;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #labels-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 2;
        }

        .label {
            position: absolute;
            color: white;
            font-size: clamp(14px, 2.7vw, 20px);
            font-weight: 600;
            text-decoration: none;
            white-space: nowrap;
            pointer-events: auto;
            cursor: pointer;
            z-index: 3;
            transform: translate(-50%, -100%);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.55);
        }

        .label.sun-label {
            color: white;
            font-size: clamp(16px, 3.4vw, 24px);
        }

        .label.moon-label {
            color: white;
        }

        .label.jupiter-label {
            color: white;
        }

        .label.venus-label {
            color: #f5e6c8;
        }

        .planet-hit {
            position: absolute;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: auto;
            cursor: pointer;
            z-index: 2;
            background: transparent;
        }
    </style>
</head>
<body>
    <canvas id="solarCanvas"></canvas>
    
    <div id="labels-container"></div>

<script>
    const canvas = document.getElementById('solarCanvas');
    const ctx = canvas.getContext('2d');
    const labelsContainer = document.getElementById('labels-container');

    let centerX;
    let centerY;
    let verticalGap;
    let sunRadius;
    let venusRadius;
    let moonRadius;
    let jupiterRadius;
    let stars = [];
    let sunPosition = { x: 0, y: 0, radius: 0 };
    let venusPosition = { x: 0, y: 0, radius: 0 };
    let moonPosition = { x: 0, y: 0, radius: 0 };
    let jupiterPosition = { x: 0, y: 0, radius: 0 };

    /** Расстояния от Солнца в а.е. (Луна — условно зона Земли ~1 а.е.). */
    const ORBIT_AU = {
        venus: 0.72,
        moon: 1,
        jupiter: 5.2
    };
    const MAX_ORBIT_AU = ORBIT_AU.jupiter;

    const planetLinks = {
        sun: 'https://xiersent.github.io/sun/',
        venus: 'https://xiersent.github.io/venus/',
        moon: 'https://xiersent.github.io/moon/',
        jupiter: 'https://cu584805.tw1.ru/'
    };
    let sunLabelElement = null;
    let venusLabelElement = null;
    let moonLabelElement = null;
    let jupiterLabelElement = null;
    let sunHitElement = null;
    let venusHitElement = null;
    let moonHitElement = null;
    let jupiterHitElement = null;

    function generateStars(count = 220) {
        stars = [];
        for (let i = 0; i < count; i++) {
            stars.push({
                x: Math.random(),
                y: Math.random(),
                size: Math.random() * 2 + 0.5,
                brightness: Math.random() * 0.45 + 0.2
            });
        }
    }

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        centerX = canvas.width / 2;
        centerY = canvas.height / 2;

        const minDimension = Math.min(canvas.width, canvas.height);
        verticalGap = Math.max(70, minDimension * 0.18);
        sunRadius = Math.max(26, minDimension * 0.085);
        venusRadius = Math.max(13, minDimension * 0.036);
        moonRadius = Math.max(11, minDimension * 0.032);
        jupiterRadius = Math.max(16, minDimension * 0.046);

        // Равномерное распределение четырёх объектов по высоте экрана.
        const topMargin = Math.max(verticalGap, minDimension * 0.16);
        const bottomMargin = canvas.height - Math.max(verticalGap, sunRadius * 2.1);
        const usableHeight = Math.max(bottomMargin - topMargin, minDimension * 0.4);
        const step = usableHeight / 3; // 4 планеты → 3 промежутка

        // Снизу вверх: Sun, Venus, Moon, Jupiter.
        sunPosition = {
            x: centerX,
            y: bottomMargin,
            radius: sunRadius,
        };
        venusPosition = {
            x: centerX,
            y: bottomMargin - step,
            radius: venusRadius,
        };
        moonPosition = {
            x: centerX,
            y: bottomMargin - step * 2,
            radius: moonRadius,
        };
        jupiterPosition = {
            x: centerX,
            y: bottomMargin - step * 3,
            radius: jupiterRadius,
        };
    }

    function createPlanetHit(className, href, ariaLabel) {
        const link = document.createElement('a');
        link.href = href;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.className = 'planet-hit ' + className;
        link.setAttribute('aria-label', ariaLabel);
        labelsContainer.appendChild(link);
        return link;
    }

    function createLabels() {
        labelsContainer.innerHTML = '';

        sunHitElement = createPlanetHit('sun-hit', planetLinks.sun, 'Sun');
        venusHitElement = createPlanetHit('venus-hit', planetLinks.venus, 'Venus');
        moonHitElement = createPlanetHit('moon-hit', planetLinks.moon, 'Moon');
        jupiterHitElement = createPlanetHit('jupiter-hit', planetLinks.jupiter, 'Jupiter');
        
        sunLabelElement = document.createElement('a');
        sunLabelElement.href = planetLinks.sun;
        sunLabelElement.target = '_blank';
        sunLabelElement.rel = 'noopener noreferrer';
        sunLabelElement.className = 'label sun-label';
        sunLabelElement.textContent = 'SUN';
        labelsContainer.appendChild(sunLabelElement);

        venusLabelElement = document.createElement('a');
        venusLabelElement.href = planetLinks.venus;
        venusLabelElement.target = '_blank';
        venusLabelElement.rel = 'noopener noreferrer';
        venusLabelElement.className = 'label venus-label';
        venusLabelElement.textContent = 'VENUS';
        labelsContainer.appendChild(venusLabelElement);
        
        moonLabelElement = document.createElement('a');
        moonLabelElement.href = planetLinks.moon;
        moonLabelElement.target = '_blank';
        moonLabelElement.rel = 'noopener noreferrer';
        moonLabelElement.className = 'label moon-label';
        moonLabelElement.textContent = 'MOON';
        labelsContainer.appendChild(moonLabelElement);

        jupiterLabelElement = document.createElement('a');
        jupiterLabelElement.href = planetLinks.jupiter;
        jupiterLabelElement.target = '_blank';
        jupiterLabelElement.rel = 'noopener noreferrer';
        jupiterLabelElement.className = 'label jupiter-label';
        jupiterLabelElement.textContent = 'JUPITER';
        labelsContainer.appendChild(jupiterLabelElement);
    }

    function updatePlanetHit(hitElement, position, glowMultiplier = 2.2) {
        if (!hitElement || !position.radius) {
            return;
        }

        const hitSize = position.radius * glowMultiplier;
        hitElement.style.left = position.x + 'px';
        hitElement.style.top = position.y + 'px';
        hitElement.style.width = hitSize + 'px';
        hitElement.style.height = hitSize + 'px';
    }

    function getLabelTop(position) {
        const minDimension = Math.min(canvas.width, canvas.height);
        const labelGap = Math.max(6, minDimension * 0.01);
        const glowPadding = position.radius * 0.2;
        return position.y - position.radius - glowPadding - labelGap;
    }

    function updateLabels() {
        updatePlanetHit(sunHitElement, sunPosition);
        updatePlanetHit(venusHitElement, venusPosition);
        updatePlanetHit(moonHitElement, moonPosition);
        updatePlanetHit(jupiterHitElement, jupiterPosition);

        if (sunLabelElement && sunPosition.radius) {
            sunLabelElement.style.left = sunPosition.x + 'px';
            sunLabelElement.style.top = getLabelTop(sunPosition) + 'px';
        }

        if (venusLabelElement && venusPosition.radius) {
            venusLabelElement.style.left = venusPosition.x + 'px';
            venusLabelElement.style.top = getLabelTop(venusPosition) + 'px';
        }
        
        if (moonLabelElement && moonPosition.radius) {
            moonLabelElement.style.left = moonPosition.x + 'px';
            moonLabelElement.style.top = getLabelTop(moonPosition) + 'px';
        }

        if (jupiterLabelElement && jupiterPosition.radius) {
            jupiterLabelElement.style.left = jupiterPosition.x + 'px';
            jupiterLabelElement.style.top = getLabelTop(jupiterPosition) + 'px';
        }
    }

    function drawPlanet(x, y, color, size, glowColor) {
        ctx.beginPath();
        ctx.fillStyle = color;
        ctx.shadowColor = glowColor;
        ctx.shadowBlur = size * 1.8;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;

        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
    }

    function drawBackgroundStars() {
        for (let star of stars) {
            ctx.fillStyle = `rgba(255, 250, 240, ${star.brightness})`;
            ctx.beginPath();
            ctx.arc(star.x * canvas.width, star.y * canvas.height, star.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function animate() {
        ctx.fillStyle = '#0a0a18';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, Math.max(canvas.width, canvas.height));
        gradient.addColorStop(0, 'rgba(35, 45, 75, 0.35)');
        gradient.addColorStop(1, 'rgba(10, 10, 20, 0.9)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        drawBackgroundStars();
        drawPlanet(jupiterPosition.x, jupiterPosition.y, '#c0a89c', jupiterPosition.radius, 'rgba(255, 225, 180, 0.3)');
        drawPlanet(moonPosition.x, moonPosition.y, '#c0c5c9', moonPosition.radius, 'rgba(255, 255, 255, 0.3)');
        drawPlanet(venusPosition.x, venusPosition.y, '#e8cda8', venusPosition.radius, 'rgba(255, 220, 160, 0.35)');
        drawPlanet(sunPosition.x, sunPosition.y, '#f5d371', sunPosition.radius, 'rgba(245, 211, 113, 0.55)');

        updateLabels();
    }

    resizeCanvas();
    generateStars();
    createLabels();
    animate();
    
    window.addEventListener('resize', () => {
        resizeCanvas();
        animate();
        updateLabels();
    });

    window.addEventListener('load', () => {
        setTimeout(updateLabels, 50);
    });
</script>
</body>
</html>
